<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - CineVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CineVerse - Contact</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="top-movies.html">Top Rated</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <main>
            <h2 style="color:aliceblue;text-align: center;">Contact Us</h2>

            <form>
                <h3 style="color:aliceblue">Get in Touch</h3>

                <div class="form-group">
                    <label for="fullname" style="color:aliceblue">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email" style="color:aliceblue">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="subject" style="color:aliceblue">Subject</label>
                    <select id="subject" name="subject" required>
                        <option value="">Select a subject</option>
                        <option value="review">Movie Review</option>
                        <option value="feedback">Feedback</option>
                        <option value="bug">Bug Report</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message" style="color:aliceblue">Message</label>
                    <textarea id="message" name="message" placeholder="Your message here..." required></textarea>
                </div>

                <input type="submit" value="Send Message">
            </form>

            <section style="margin-top: 40px;">
                <h2>Contact Information</h2>
                <p><strong>Email:</strong> info@cineverse.com</p>
                <p><strong>Phone:</strong> 58674 35687</p>
                <p><strong>Address:</strong> 123 Cinema block, near AVM studios,TamilNadu,Chennai</p>
            </section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 CineVerse - Movie Review Website</p>
        <p><a href="contact.html">Contact Us</a></p>
    </footer>
</body>
</html>
